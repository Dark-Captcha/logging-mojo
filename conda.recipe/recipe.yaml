context:
  version: "0.1.0"
  mojo_version: "=1.0.0b3.dev2026061706"

package:
  name: "logging-mojo"
  version: ${{ version }}

source:
  - git: https://github.com/Dark-Captcha/logging-mojo.git
    rev: c0563260342f83ed77e3cc173e2e6243be2c9566

build:
  number: 0
  script:
    - mkdir -p ${{ PREFIX }}/lib/mojo
    - mojo package logging -I ${{ PREFIX }}/lib/mojo -o ${{ PREFIX }}/lib/mojo/logging.mojopkg

requirements:
  build:
    - mojo-compiler ${{ mojo_version }}
  host:
    - mojo-compiler ${{ mojo_version }}
    - chrono
  run:
    - ${{ pin_compatible('mojo-compiler') }}
    - chrono

tests:
  - script:
      - if: unix
        then:
          - mojo run -I . tests/run_tests.mojo
    files:
      source:
        - logging/
        - tests/
    requirements:
      build:
        - mojo ${{ mojo_version }}
      run:
        - mojo ${{ mojo_version }}
        - chrono

about:
  homepage: https://github.com/Dark-Captcha/logging-mojo
  license: Apache-2.0
  license_file: LICENSE
  summary: Typed structured logging library for Mojo
  repository: https://github.com/Dark-Captcha/logging-mojo

extra:
  maintainers:
    - Dark-Captcha
  project_name:
    - logging-mojo
